<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}" dir="{{ or site.Language.Direction `ltr` }}">

<head>
  {{ partial "head.html" . }}
</head>

<body>

  <div class="page-transition" data-pagefind-ignore></div>

  <header class="site-header" data-pagefind-ignore>
    {{ partial "header.html" . }}
  </header>

  <div data-pagefind-ignore>
    {{ partial "menu.html" . }}
  </div>

  <!-- WRAPPER START: This is the new scroll container -->
  <div class="content-wrapper">
    <main>
      {{ block "main" . }}{{ end }}
    </main>

    <footer data-pagefind-ignore>
      {{ partial "footer.html" . }}
    </footer>
  </div>
  <!-- WRAPPER END -->

</body>
</html>
