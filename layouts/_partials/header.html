<div class="header-left">
  <svg viewBox="0 0 40 40" width="40" height="40">
    <circle cx="20" cy="15" r="6" stroke="#111" stroke-width="2.5" fill="none" />
    <path d="M8 35 Q8 26 20 26 Q32 26 32 35" stroke="#111" stroke-width="2.5" stroke-linecap="round" fill="none" />
  </svg>
</div>

<div class="logo-box">
  {{ $logo := resources.Get "images/arenarintel-logo.png" }}
  {{ if $logo }}
    <a href="/"><img src="{{ $logo.RelPermalink }}" alt="Arenar Intel Logo" /></a>
  {{ else }}
    <a href="/" class="text-logo">{{ site.Title }}</a>
  {{ end }}
</div>

<div class="header-right">
  <svg id="hamburgerBtn" class="hamburgerbtn" stroke="#111" viewBox="0 0 40 40">
    <line x1="2" y1="12" x2="18" y2="12" stroke-width="2.5" stroke-linecap="round" />
    <line x1="2" y1="20" x2="14" y2="20" stroke-width="2.5" stroke-linecap="round" />
    <line x1="2" y1="28" x2="18" y2="28" stroke-width="2.5" stroke-linecap="round" />
    <circle cx="24" cy="20" r="5.5" stroke-width="2.5" fill="none" />
    <line x1="28.2" y1="24.8" x2="31" y2="27.6" stroke-width="2.5" stroke-linecap="round" />
  </svg>

  <svg class="close-icon" id="closeBtn" viewBox="0 0 40 40" width="40" height="40">
    <line x1="12" y1="12" x2="28" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
    <line x1="28" y1="12" x2="12" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
  </svg>
</div>
