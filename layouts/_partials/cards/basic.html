<a href="{{ .RelPermalink }}" class="card-link">
      <article class="basic-card">
        <img
  src="{{ .Params.image | default "/images/fallback.jpg" }}"
  alt="{{ .Title }}"
/>
        <div class="basic-card-info">
          <h3>{{ .Title }}</h3>
          <p>{{ .Params.summary }}</p>
        </div>
      </article>
    </a>
