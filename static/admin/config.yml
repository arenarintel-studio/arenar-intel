# ── BACKEND CONFIGURATION LAYER ───────────────────────
backend:
  name: git-gateway
  branch: main

# ── EDITORIAL WORKFLOW MANAGEMENT ─────────────────────
# Enables Decap's advanced editorial kanban board (Drafts -> Review -> Ready)
publish_mode: simple

# ── GLOBAL MEDIA ASSET MANAGEMENT ─────────────────────
# Configured specifically for Hugo's native /static lookup system
media_folder: "static/uploads"
public_folder: "/uploads"

# ── STRUCTURAL DATABASE PATH MAPPING ──────────────────
collections:
  - name: "intel"
    label: "Intelligence Feed"
    label_singular: "Intel Briefing"
    folder: "content/intel"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"

    # ── CRITICAL HUGO PARSING FIXES ──
    # Prevents YAML leakage; forces valid TOML delimiters (+++)
    format: "toml-frontmatter"
    extension: "md"

    # ── UI EDITING PANEL SETTINGS ──
    editor:
      preview: false # Set to true if utilizing custom React layout frames

    fields:
      # ── CORE EDITORIAL ATTRIBUTES ──
      - label: "Headline / Title"
        name: "title"
        widget: "string"
        required: true

      - label: "Publication Date & Time"
        name: "date"
        widget: "datetime"
        required: true
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: "Content Status (Draft)"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "Turn on to keep this briefing hidden from production deployment builds."

      # ── HOMEPAGE CARD LAYOUT MAPPING (PRESERVED) ──
      - label: "Card Layout Component Style"
        name: "card"
        widget: "select"
        required: true
        default: "basic"
        options:
          - { label: "Featured Hero Card", value: "featured" }
          - { label: "Compact Feed List", value: "compact" }
          - { label: "Standard Basic Card", value: "basic" }
          - { label: "Pure Text Row", value: "text" }
          - { label: "Grid Block Component", value: "grid" }

      - label: "Homepage Hero Featured Placement"
        name: "homepage_featured"
        widget: "boolean"
        default: false
        required: false
        hint: "If enabled, this maps directly to your homepage's main hero slot logic."

      # ── ADVANCED NEWSROOM METADATA ──
      - label: "Breaking Intelligence Flag"
        name: "breaking_news"
        widget: "boolean"
        default: false
        required: false
        hint: "Triggers high-visibility visual alerts or ticker banners across global layouts if built into front-end."

      - label: "Coverage Priority Weight"
        name: "priority"
        widget: "number"
        default: 0
        value_type: "int"
        required: false
        hint: "Higher numbers can be used to elevate content ordering within specific cards."

      - label: "Article Classification Type"
        name: "type"
        widget: "select"
        default: "intel"
        required: true
        options:
          - { label: "Intelligence Briefing", value: "intel" }
          - { label: "Market Analysis", value: "analysis" }
          - { label: "Cyber Security Advisory", value: "cyber" }
          - { label: "Breaking Feed", value: "breaking" }

      # ── ASSET & MEDIA INJECTION ──
      - label: "Featured Display Image"
        name: "image"
        widget: "image"
        required: false

      - label: "Primary Executive Summary"
        name: "summary"
        widget: "text"
        required: false
        hint: "Brief 1-2 sentence snippet utilized directly by card descriptions."

      # ── CREDENTIALS & ATTRIBUTION ──
      - label: "Assigned Reporter / Desk"
        name: "reporter"
        widget: "string"
        required: false
        default: "Arenar Intelligence Desk"

      - label: "Intel Origin / Primary Sources"
        name: "source_links"
        widget: "list"
        required: false
        hint: "Add reference URLs or internal cross-reference intelligence citations."
        field: { label: "Source URL", name: "url", widget: "string" }

      # ── SECTIONS & CATEGORIZATION ──
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        hint: "Comma separated keywords for system routing indices (e.g., bitcoin, privacy, exploit)."
        field: { label: "Tag Keyword", name: "tag", widget: "string" }

      # ── SEARCH ENGINE & ADAPTIVE METRICS (SEO) ──
      - label: "SEO Meta Title"
        name: "meta_title"
        widget: "string"
        required: false
        hint: "Overrides header title tags on search engine result view frames. Best kept under 60 characters."

      - label: "SEO Meta Description"
        name: "meta_description"
        widget: "text"
        required: false
        hint: "Search engine listing snippet text block. Keep under 155 characters for optimal performance."

      - label: "OpenGraph / Social Card Image Override"
        name: "og_image"
        widget: "image"
        required: false
        hint: "Custom dimensions optimized explicitly for social framework sharing targets (1200x630px)."

      - label: "Canonical URL Override"
        name: "canonical_url"
        widget: "string"
        required: false
        hint: "Use only if cross-posting an intelligence report originally published by an outside partner desk."

      # ── CORE MARKDOWN PROCESSING LAYER ──
      - label: "Intel Report Body"
        name: "body"
        widget: "markdown"
        required: true
